<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org" lang="ru">

<head>

    <meta charset="UTF-8">
    <title>Users</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        h1, h2 { color: #333; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
        form { margin-top: 20px; padding: 15px; border: 1px solid #eee; background-color: #f9f9f9; border-radius: 5px;}
        form label { display: inline-block; width: 80px; margin-bottom: 5px; }
        form input[type="text"], form input[type="number"] { width: 200px; padding: 8px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px; }
        form button { padding: 10px 15px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        form button:hover { background-color: #0056b3; }
        .edit-button, .delete-button { padding: 5px 10px; border: none; border-radius: 4px; cursor: pointer; margin-right: 5px; }
        .edit-button { background-color: #28a745; color: white; }
        .edit-button:hover { background-color: #218838; }
        .delete-button { background-color: #dc3545; color: white; }
        .delete-button:hover { background-color: #c82333; }
    </style>
</head>
<body>

<h1>Пользователи</h1>

<!-- вывод всех пользователей -->
<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Имя</th>
        <th>Email</th>
        <th>Возраст</th>
        <th>Действия</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="user:${users}">
        <td th:text="${user.id}"></td>
        <td th:text="${user.name}"></td>
        <td th:text="${user.email}"></td>
        <td th:text="${user.age}"></td>
        <td>
            <!-- Форма для редактирования: при нажатии на кнопку отправляем GET-запрос с параметром ID -->
            <form th:action="@{/users/edit}" method="get" style="display:inline;">
                <input type="hidden" name="id" th:value="${user.id}"/>
                <button type="submit" class="edit-button">Редактировать</button>
            </form>
            <!-- Форма для удаления: при нажатии на кнопку отправляем POST-запрос с ID -->
            <form th:action="@{/users/delete}" method="post" style="display:inline;">
                <input type="hidden" name="id" th:value="${user.id}"/>
                <button type="submit" class="delete-button">Удалить</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>

<h2 th:text="${user.id == null or user.id == 0} ? 'Добавить нового пользователя' : 'Редактировать пользователя (ID: ' + user.id + ')'"></h2>
<form th:action="${user.id == null or user.id == 0} ? '/users/add' : '/users/update'"
      th:object="${user}" method="post">
    <input type="hidden" th:field="*{id}" th:if="${user.id != null and user.id != 0}"/>
    <label for="name">Имя:</label>
    <input type="text" id="name" th:field="*{name}" required/><br/>
    <label for="email">Email:</label>
    <input type="text" id="email" th:field="*{email}" required/><br/>
    <label for="age">Возраст:</label>
    <input type="number" id="age" th:field="*{age}" min="1" max="150" required/><br/>
    <button type="submit" th:text="${user.id == null or user.id == 0} ? 'Добавить' : 'Обновить'"></button>


</form>

</body>
</html>
