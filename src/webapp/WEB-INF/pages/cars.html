<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Список машин</title>
  <style>
    table { border-collapse: collapse; width: 50%; margin: 20px; }
    th, td { border: 1px solid black; padding: 8px; text-align: left; }
    th { background-color: #f2f2f2; }
  </style>
</head>
<body>
<h2>Список машин</h2>
<table>
  <thead>
  <tr><th>ID</th><th>Марка</th><th>Модель</th><th>Год</th></tr>
  </thead>
  <tbody>
  <tr th:each="car : ${cars}">
    <td th:text="${car.id}">1</td>
    <td th:text="${car.brand}">Toyota</td>
    <td th:text="${car.model}">Camry</td>
    <td th:text="${car.year}">2020</td>
  </tr>
  </tbody>
</table>
<br/>
<a href="/cars">Все машины</a><br/>
<a href="/cars?count=2">2 машины</a><br/>
<a href="/cars?count=3">3 машины</a><br/>
</body>
</html>
